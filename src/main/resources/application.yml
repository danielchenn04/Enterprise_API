spring:
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/enterpriseapi}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    # Base64-encoded 256-bit secret — override with JWT_SECRET env var in production
    secret: ${JWT_SECRET:c29tZS1zdXBlci1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZA==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24h
  rate-limit:
    tiers:
      free:
        capacity: 100
        refill-tokens: 100
        refill-period-seconds: 60
      enterprise:
        capacity: 1000
        refill-tokens: 1000
        refill-period-seconds: 60

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
